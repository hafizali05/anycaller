AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: anycaller — Cognito (UP + App Client), DynamoDB single-table, FastAPI Lambda (container) on a Function URL. Mirrors hafiz.in conventions.

Parameters:
  AllowedOrigins:
    Type: CommaDelimitedList
    Default: http://localhost:3000
    Description: >
      Comma-separated list of CORS allow-origins for the Function URL.
      Include the Amplify URL once the frontend is deployed
      (e.g. http://localhost:3000,https://main.<id>.amplifyapp.com).

Globals:
  Function:
    MemorySize: 1024
    Timeout: 30
    Architectures: [x86_64]
    Tracing: Active

Resources:
  # ──────────────────────────────────────────────────────────────────
  # Cognito — User Pool + App Client for the anycaller SaaS.
  # PRD calls for a new pool (not reusing hafiz.in's single-user one).
  # Email-as-username, self-signup, 8+ char password.
  # ──────────────────────────────────────────────────────────────────
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: anycaller-users
      UsernameAttributes: [email]
      AutoVerifiedAttributes: [email]
      MfaConfiguration: "OFF"
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: false
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      EmailConfiguration:
        EmailSendingAccount: COGNITO_DEFAULT
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: anycaller-web
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED
      AccessTokenValidity: 60      # minutes
      IdTokenValidity: 60          # minutes
      RefreshTokenValidity: 30     # days
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days
      ReadAttributes: [email, email_verified]
      WriteAttributes: [email]

  # ──────────────────────────────────────────────────────────────────
  # DynamoDB single-table (PRD §7 — DDB favoured for write throughput).
  # PK = entity#id (e.g. WS#<workspaceId>, USR#<sub>); SK varies per
  # access pattern. GSIs added in later slices as access patterns
  # crystallise.
  # ──────────────────────────────────────────────────────────────────
  DataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: anycaller-data
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: pk, AttributeType: S }
        - { AttributeName: sk, AttributeType: S }
      KeySchema:
        - { AttributeName: pk, KeyType: HASH }
        - { AttributeName: sk, KeyType: RANGE }
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true

  # ──────────────────────────────────────────────────────────────────
  # API Lambda — FastAPI via AWS Lambda Web Adapter (container).
  # Mirrors hafiz.in's JobApplyFn but without Playwright/Chromium.
  # ──────────────────────────────────────────────────────────────────
  ApiFn:
    Type: AWS::Serverless::Function
    Metadata:
      DockerTag: latest
      DockerContext: ./server
      Dockerfile: Dockerfile
    Properties:
      FunctionName: anycaller-api-fn
      PackageType: Image
      LoggingConfig:
        LogGroup: !Ref ApiFnLogGroup
        LogFormat: JSON
        ApplicationLogLevel: WARN
        SystemLogLevel: WARN
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref UserPool
          COGNITO_APP_CLIENT_ID: !Ref UserPoolClient
          DDB_TABLE: !Ref DataTable
          ALLOWED_ORIGINS: !Join [",", !Ref AllowedOrigins]
      FunctionUrlConfig:
        AuthType: NONE  # JWT verified inside the function via PyJWKClient
        InvokeMode: BUFFERED
        # CORS is handled by FastAPI's CORSMiddleware so we get one
        # Access-Control-Allow-Origin header per response. If we set Cors:
        # here AND in FastAPI, the headers get duplicated (comma-joined)
        # which strict browsers reject.
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:DeleteItem
                - dynamodb:Query
                - dynamodb:BatchGetItem
                - dynamodb:BatchWriteItem
              Resource:
                - !GetAtt DataTable.Arn
                - !Sub "${DataTable.Arn}/index/*"

  # Pre-create LogGroup so we control retention (Lambda would otherwise
  # create with never-expire). Same pattern as hafiz.in.
  ApiFnLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/anycaller-api-fn
      RetentionInDays: 1

  # ──────────────────────────────────────────────────────────────────
  # Voice — SIP Media Application (SMA) Lambda for Chime SDK PSTN
  # audio. Invoked by Chime every time something happens on a call
  # (new inbound, action complete, hangup, etc.). Returns a list of
  # PSTN actions (Speak / Hangup / ...) for Chime to execute.
  #
  # Packaged as a zip (NOT a container image) because the handler is
  # tiny — just boto3 + stdlib — so a zip is faster to deploy and
  # cheaper to cold-start than the container ApiFn.
  #
  # The user must wire this function's ARN (see VoiceSmaFnArn output)
  # into a SIP Media Application in the Chime SDK console once their
  # UK phone number is verified.
  # ──────────────────────────────────────────────────────────────────
  VoiceSmaFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: anycaller-voice-sma-fn
      CodeUri: server/voice/
      Handler: sma_handler.lambda_handler
      Runtime: python3.12
      PackageType: Zip
      LoggingConfig:
        LogGroup: !Ref VoiceSmaFnLogGroup
        LogFormat: JSON
        ApplicationLogLevel: WARN
        SystemLogLevel: WARN
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                # Polly for the Speak action's TTS. Chime calls Polly
                # itself when it executes a Speak action, but having
                # the perm on the function means we can also call
                # Polly directly from the handler later if we want
                # to pre-synthesise audio.
                - polly:SynthesizeSpeech
                # Transcribe Streaming for Stage 4 (live STT). We
                # don't use it yet but grant now so the IAM change
                # doesn't block a later code-only deploy.
                - transcribe:StartStreamTranscription
                # Bedrock for Stage 5 (Claude as the brain). Same
                # rationale — scoped to "*" for now, will lock to
                # specific model ARNs once we pick one.
                - bedrock:InvokeModel
              Resource: "*"

  # LogGroup with retention, same pattern as the API Lambda.
  VoiceSmaFnLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/anycaller-voice-sma-fn
      RetentionInDays: 1

  # Allow the Chime SDK Voice service to invoke this Lambda. Without
  # this permission Chime will get AccessDenied when the SIP Media
  # Application tries to fire the function on a new call. The Chime
  # SDK Voice service principal is `voiceconnector.chime.amazonaws.com`
  # (used by both Voice Connectors and SIP Media Applications).
  VoiceSmaFnChimeInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt VoiceSmaFn.Arn
      Action: lambda:InvokeFunction
      Principal: voiceconnector.chime.amazonaws.com
      # We don't constrain SourceArn here because the SIP Media
      # Application is created out-of-band (in the Chime console)
      # after the stack deploys, so its ARN isn't known yet. Tighten
      # to the SMA ARN once it's been created.

Outputs:
  FunctionUrl:
    Description: Public Function URL — set as NEXT_PUBLIC_API_BASE_URL in Amplify.
    Value: !GetAtt ApiFnUrl.FunctionUrl
  UserPoolId:
    Description: Cognito User Pool ID — set as NEXT_PUBLIC_COGNITO_USER_POOL_ID.
    Value: !Ref UserPool
  UserPoolClientId:
    Description: Cognito App Client ID — set as NEXT_PUBLIC_COGNITO_APP_CLIENT_ID.
    Value: !Ref UserPoolClient
  DataTableName:
    Value: !Ref DataTable
  VoiceSmaFnArn:
    Description: >
      ARN of the SIP Media Application Lambda. Paste this into the
      "Endpoint" field when creating a SIP Media Application in the
      Chime SDK Voice console, then assign your verified phone number
      to that SMA.
    Value: !GetAtt VoiceSmaFn.Arn
