AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: anycaller — Cognito (UP + App Client), DynamoDB single-table, FastAPI Lambda (container) on a Function URL. Mirrors hafiz.in conventions.

Parameters:
  AllowedOrigin:
    Type: String
    Default: http://localhost:3000
    Description: >
      CORS allow-origin for the Function URL. Set to the Amplify URL once
      the frontend is deployed (e.g. https://main.<id>.amplifyapp.com).

Globals:
  Function:
    MemorySize: 1024
    Timeout: 30
    Architectures: [x86_64]
    Tracing: Active

Resources:
  # ──────────────────────────────────────────────────────────────────
  # Cognito — User Pool + App Client for the anycaller SaaS.
  # PRD calls for a new pool (not reusing hafiz.in's single-user one).
  # Email-as-username, self-signup, 8+ char password.
  # ──────────────────────────────────────────────────────────────────
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: anycaller-users
      UsernameAttributes: [email]
      AutoVerifiedAttributes: [email]
      MfaConfiguration: "OFF"
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: false
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      EmailConfiguration:
        EmailSendingAccount: COGNITO_DEFAULT
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: anycaller-web
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED
      AccessTokenValidity: 60      # minutes
      IdTokenValidity: 60          # minutes
      RefreshTokenValidity: 30     # days
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days
      ReadAttributes: [email, email_verified]
      WriteAttributes: [email]

  # ──────────────────────────────────────────────────────────────────
  # DynamoDB single-table (PRD §7 — DDB favoured for write throughput).
  # PK = entity#id (e.g. WS#<workspaceId>, USR#<sub>); SK varies per
  # access pattern. GSIs added in later slices as access patterns
  # crystallise.
  # ──────────────────────────────────────────────────────────────────
  DataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: anycaller-data
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: pk, AttributeType: S }
        - { AttributeName: sk, AttributeType: S }
      KeySchema:
        - { AttributeName: pk, KeyType: HASH }
        - { AttributeName: sk, KeyType: RANGE }
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true

  # ──────────────────────────────────────────────────────────────────
  # API Lambda — FastAPI via AWS Lambda Web Adapter (container).
  # Mirrors hafiz.in's JobApplyFn but without Playwright/Chromium.
  # ──────────────────────────────────────────────────────────────────
  ApiFn:
    Type: AWS::Serverless::Function
    Metadata:
      DockerTag: latest
      DockerContext: ./server
      Dockerfile: Dockerfile
    Properties:
      FunctionName: anycaller-api-fn
      PackageType: Image
      LoggingConfig:
        LogGroup: !Ref ApiFnLogGroup
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref UserPool
          COGNITO_APP_CLIENT_ID: !Ref UserPoolClient
          DDB_TABLE: !Ref DataTable
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      FunctionUrlConfig:
        AuthType: NONE  # JWT verified inside the function via PyJWKClient
        InvokeMode: BUFFERED
        Cors:
          AllowOrigins: [!Ref AllowedOrigin]
          AllowMethods: [GET, POST, PUT, DELETE]
          AllowHeaders: [Authorization, Content-Type]
          MaxAge: 3000
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:DeleteItem
                - dynamodb:Query
                - dynamodb:BatchGetItem
                - dynamodb:BatchWriteItem
              Resource:
                - !GetAtt DataTable.Arn
                - !Sub "${DataTable.Arn}/index/*"

  # Pre-create LogGroup so we control retention (Lambda would otherwise
  # create with never-expire). Same pattern as hafiz.in.
  ApiFnLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/anycaller-api-fn
      RetentionInDays: 14

Outputs:
  FunctionUrl:
    Description: Public Function URL — set as NEXT_PUBLIC_API_BASE_URL in Amplify.
    Value: !GetAtt ApiFnUrl.FunctionUrl
  UserPoolId:
    Description: Cognito User Pool ID — set as NEXT_PUBLIC_COGNITO_USER_POOL_ID.
    Value: !Ref UserPool
  UserPoolClientId:
    Description: Cognito App Client ID — set as NEXT_PUBLIC_COGNITO_APP_CLIENT_ID.
    Value: !Ref UserPoolClient
  DataTableName:
    Value: !Ref DataTable
