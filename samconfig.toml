version = 0.1

[default.global.parameters]
stack_name = "anycaller"

[default.build.parameters]
cached = true
parallel = true

[default.deploy.parameters]
region = "eu-west-2"
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
resolve_image_repos = true
image_repositories = []
fail_on_empty_changeset = false
disable_rollback = false
# AllowedOrigin is bumped to the real Amplify URL after the first deploy
# (CFN ignores template Default changes once a param has been resolved,
# so pin overrides here).
parameter_overrides = "AllowedOrigins=http://localhost:3000,https://main.d3ctz0i36mpyeq.amplifyapp.com"
